[pycodestyle]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    */migrations/*,
    */tests.py

[pydocstyle]
convention = pep257
match = (?!tests\.py).*\.py
match-dir = (?!migrations).*

[coverage:run]
source =
    auth_app
    content_app
    core
omit =
    */migrations/*
    */tests.py
    */__init__.py
    */__pycache__/*
    .venv/*

[coverage:report]
show_missing = True
skip_covered = True
omit =
    */migrations/*
    */tests.py
    */__init__.py
    */__pycache__/*
    .venv/*