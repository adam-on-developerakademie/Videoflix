[pycodestyle]
max-line-length = 100
exclude =
    .git,
    .venv,
    __pycache__,
    */migrations/*,
    */tests.py

[pydocstyle]
convention = pep257
match = (?!tests\.py).*\.py
match-dir = (?!migrations|\.venv|__pycache__).*

[coverage:run]
source =
    auth_app
    content_app
    core
omit =
    */migrations/*
    */tests.py
    */__init__.py
    */__pycache__/*
    .venv/*

[coverage:report]
show_missing = True
skip_covered = True
omit =
    */migrations/*
    */tests.py
    */__init__.py
    */__pycache__/*
    .venv/*

[tool:pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py
addopts = -ra --cov --cov-report=term-missing
testpaths =
    auth_app
    content_app